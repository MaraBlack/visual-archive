<section class="w-full py-8 px-4 md:px-10 lg:px-20 text-black">
  <div class="max-w-screen-xl mx-auto">
    <!-- Sticky header -->
    <header class="pb-4">
      <!-- Title -->
      <h1 class="typ-page-title my-4">Collection</h1>

      <!-- Filters -->
      <div class="flex items-center gap-3 my-4">
        <button
          (click)="setFilter('all')"
          class="filter-btn typ-filter"
          [class.active]="selectedKey === 'all'"
        >
          all
        </button>
        <button
          *ngFor="let k of keys"
          (click)="setFilter(k)"
          class="filter-btn typ-filter"
          [class.active]="selectedKey === k"
        >
          {{ k }}
        </button>
      </div>

      <!-- Progress bar under title -->
      <div class="my-4 h-[2px] w-full bg-black/5">
        <div
          class="h-full bg-[#2563EB] transition-[width] duration-300"
          [style.width.%]="total > 0 ? (loadedCount / total) * 100 : 0"
        ></div>
      </div>
    </header>

    <!-- Grid -->
    <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <a
        *ngFor="let it of items"
        class="group block overflow-hidden rounded-md"
        [routerLink]="['/collection', selectedKey, it.id]"
      >
        <div class="w-full h-auto bg-gray-100 overflow-hidden">
          <img
            [src]="it.img"
            [alt]="it.title"
            class="w-full h-full object-cover transition-all duration-[1000ms] ease-out"
          />
        </div>
        <div class="mt-3 text-sm">
          <div
            *ngIf="selectedKey === 'all'"
            class="text-black/80 uppercase tracking-[0.12em] mr-2 font-inter"
          >
            {{ it.key }}
          </div>
          <div class="text-black/80 tracking-[0.12em] mr-2 font-space">
            {{ it.title }}
          </div>
          <div
            class="uppercase tracking-[0.12em] mr-2 font-inter text-black/40"
          >
            {{ it.date | date : 'MMM yyyy' }}
          </div>
        </div>
      </a>
    </div>

    <!-- Infinite scroll sentinel + small spinner -->
    <div
      *ngIf="hasMore"
      #infiniteAnchor
      class="mt-10 h-10 flex items-center justify-center"
    >
      <div *ngIf="loading && items.length > 0" class="flex items-center gap-2">
        <span class="spinner-sm"></span>
        <span
          class="font-inter uppercase tracking-[0.2em] text-[0.65rem] text-black/40"
        >
          loading…
        </span>
      </div>
      <span *ngIf="!loading">&nbsp;</span>
    </div>

    <!-- Error state -->
    <div *ngIf="error" class="mt-4 text-center text-red-500 text-sm">
      {{ error }}
    </div>
  </div>
</section>
