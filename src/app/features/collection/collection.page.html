<section
  class="w-full py-12 px-4 md:px-10 lg:px-20 text-black opacity-0 animate-collection-enter"
>
  <div class="max-w-screen-xl mx-auto">
    <h1
      class="font-inter uppercase tracking-[0.2em] text-2xl md:text-3xl mb-8 opacity-0 animate-collection-title"
    >
      Collection
    </h1>

    <div
      class="flex items-center gap-3 mb-6 opacity-0 animate-collection-filters"
    >
      <button
        (click)="setFilter('all')"
        class="filter-btn px-3 py-1 rounded uppercase tracking-[0.12em] font-inter text-sm transition-all duration-300"
        [class.active]="selectedKey === 'all'"
      >
        All
      </button>

      <button
        *ngFor="let k of keys"
        (click)="setFilter(k)"
        class="filter-btn px-3 py-1 rounded uppercase tracking-[0.12em] font-inter text-sm transition-all duration-300"
        [class.active]="selectedKey === k"
      >
        {{ k }}
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 h-1/6">
      <a
        *ngFor="let it of items; let i = index"
        class="group block overflow-hidden rounded-md opacity-0 animate-collection-card"
        [style.animationDelay.ms]="i * 120"
        [routerLink]="['/collection', selectedKey, it.id]"
      >
        <div class="w-full h-auto bg-gray-100 overflow-hidden">
          <img
            [src]="it.img"
            [alt]="it.title"
            loading="lazy"
            decoding="async"
            class="w-full h-full object-cover grayscale opacity-80 transition-all duration-[1000ms] ease-out group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-[1.04]"
          />
        </div>

        <div class="mt-3 text-sm space-y-1">
          <div
            *ngIf="selectedKey === 'all'"
            class="text-black/80 uppercase tracking-[0.12em] mr-2 font-inter"
          >
            {{ it.key }}
          </div>
          <div class="text-black/80 tracking-[0.12em] mr-2 font-space">
            {{ it.title }}
          </div>
          <div
            class="uppercase tracking-[0.12em] mr-2 font-inter text-black/40"
          >
            {{ it.year }}
          </div>
        </div>
      </a>
    </div>

    <div class="mt-10 flex items-center justify-center">
      <button
        (click)="loadMore()"
        [disabled]="loading || !hasMore"
        class="px-4 py-2 rounded uppercase tracking-[0.18em] font-inter text-xs text-black/60 border border-black/10 hover:border-black/20 hover:text-black/80 transition disabled:text-black/20 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Loading…' : hasMore ? 'Load more' : 'No more items' }}
      </button>
    </div>

    <div *ngIf="error" class="mt-4 text-center text-sm text-red-600">
      {{ error }}
    </div>
  </div>
</section>
